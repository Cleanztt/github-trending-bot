name: GitHub Trending Bot

on:
  schedule:
    # 每天早上 9:00 北京时间 (UTC+8 → UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 workflow 往仓库推代码

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install CJK fonts (for Chinese text rendering)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Generate report image (save to file only)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 不传 DINGTALK_WEBHOOK，让脚本进入本地模式只生成图片
        run: python main.py

      - name: Commit & push generated image to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report-*.png
          git diff --cached --quiet || git commit -m "📊 Auto: add daily report image $(date +%Y-%m-%d)"
          git push

      - name: Send DingTalk notification (image URL now live)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python notify.py
